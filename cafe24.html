<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카페24 상세페이지</title>
    <style>
    *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    }
    #wrap{
      display: flex;
      justify-content: center;
      gap: 100px;
      max-width: 1400px;
      margin: 0 auto;
    }
    #wrap > div{
      width: calc(100% / 2);
    }
    img{
      width: 100%;
      display: block;
    }
    </style>
</head>
<body>
    <div id="wrap">
        <div class="d1">
            <img src="img/cafe24/page1.png" alt="세럼 이미지">
        </div>
        <div class="d2">
            <img src="img/cafe24/page2.png" alt="에센스 이미지">
        </div>
    </div><!--#wrap-->
</body>
</html>
